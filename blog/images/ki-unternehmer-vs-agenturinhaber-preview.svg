<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0b"/>
      <stop offset="100%" style="stop-color:#0f0f12"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#39ff14" stroke-width="0.3" opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#39ff14" stroke-width="0.3" opacity="0.08"/>

  <!-- VS divider line -->
  <line x1="600" y1="80" x2="600" y2="550" stroke="#39ff14" stroke-width="1.5" opacity="0.4" filter="url(#glow-soft)"/>

  <!-- Left side: KI-Unternehmer -->
  <text x="300" y="160" font-family="Inter, sans-serif" font-weight="800" font-size="22" fill="#39ff14" text-anchor="middle" letter-spacing="3" opacity="0.8">KI-UNTERNEHMER</text>
  <!-- Person icon left -->
  <circle cx="300" cy="240" r="36" fill="none" stroke="#39ff14" stroke-width="2" opacity="0.6" filter="url(#glow-soft)"/>
  <circle cx="300" cy="225" r="12" fill="#39ff14" opacity="0.7"/>
  <path d="M265 285 Q300 260 335 285" fill="#39ff14" opacity="0.5"/>
  <!-- KI node dots -->
  <circle cx="200" cy="320" r="5" fill="#39ff14" opacity="0.5"/>
  <circle cx="240" cy="360" r="5" fill="#39ff14" opacity="0.5"/>
  <circle cx="360" cy="320" r="5" fill="#39ff14" opacity="0.5"/>
  <circle cx="380" cy="370" r="5" fill="#39ff14" opacity="0.5"/>
  <line x1="300" y1="276" x2="200" y2="320" stroke="#39ff14" stroke-width="1" opacity="0.3"/>
  <line x1="300" y1="276" x2="240" y2="360" stroke="#39ff14" stroke-width="1" opacity="0.3"/>
  <line x1="300" y1="276" x2="360" y2="320" stroke="#39ff14" stroke-width="1" opacity="0.3"/>
  <line x1="300" y1="276" x2="380" y2="370" stroke="#39ff14" stroke-width="1" opacity="0.3"/>

  <!-- Right side: Agenturinhaber -->
  <text x="900" y="160" font-family="Inter, sans-serif" font-weight="800" font-size="22" fill="#f0f0f2" text-anchor="middle" letter-spacing="3" opacity="0.6">AGENTURINHABER</text>
  <!-- Person icons right (multiple) -->
  <circle cx="900" cy="230" r="28" fill="none" stroke="#64748b" stroke-width="1.5" opacity="0.7"/>
  <circle cx="900" cy="218" r="10" fill="#64748b" opacity="0.6"/>
  <path d="M875 265 Q900 248 925 265" fill="#64748b" opacity="0.4"/>
  <!-- Smaller people around -->
  <circle cx="820" cy="295" r="18" fill="none" stroke="#64748b" stroke-width="1" opacity="0.4"/>
  <circle cx="980" cy="295" r="18" fill="none" stroke="#64748b" stroke-width="1" opacity="0.4"/>
  <circle cx="850" cy="340" r="18" fill="none" stroke="#64748b" stroke-width="1" opacity="0.4"/>
  <circle cx="950" cy="340" r="18" fill="none" stroke="#64748b" stroke-width="1" opacity="0.4"/>
  <circle cx="790" cy="370" r="14" fill="none" stroke="#64748b" stroke-width="1" opacity="0.3"/>
  <circle cx="1010" cy="370" r="14" fill="none" stroke="#64748b" stroke-width="1" opacity="0.3"/>

  <!-- VS badge -->
  <circle cx="600" cy="315" r="42" fill="#0a0a0b"/>
  <circle cx="600" cy="315" r="42" fill="none" stroke="#39ff14" stroke-width="2" opacity="0.6" filter="url(#glow-soft)"/>
  <text x="600" y="323" font-family="Inter, sans-serif" font-weight="900" font-size="28" fill="#39ff14" text-anchor="middle" filter="url(#glow-soft)">VS</text>

  <!-- Title -->
  <text x="600" y="490" font-family="Inter, sans-serif" font-weight="800" font-size="38" fill="#f0f0f2" text-anchor="middle">Einer gegen 15 – wer baut das bessere Business?</text>
  <text x="600" y="530" font-family="Inter, sans-serif" font-weight="400" font-size="18" fill="#64748b" text-anchor="middle">8 Disziplinen. Kein Schiedsrichter. Ehrliches Ergebnis.</text>

  <!-- scale² watermark -->
  <text x="1160" y="610" font-family="Inter, sans-serif" font-weight="700" font-size="14" fill="#39ff14" text-anchor="end" opacity="0.4">scale²</text>
</svg>
