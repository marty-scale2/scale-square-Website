<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#141418"/>
      <stop offset="100%" stop-color="#0a0a0d"/>
    </radialGradient>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-dot">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gray">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
  </g>

  <!-- Center divider -->
  <line x1="400" y1="40" x2="400" y2="360" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4,5"/>

  <!-- ================================ -->
  <!-- LEFT SIDE: KI-Unternehmer        -->
  <!-- Hub-and-spoke: lean + efficient  -->
  <!-- ================================ -->

  <!-- Spoke connections from center -->
  <line x1="200" y1="200" x2="120" y2="120" stroke="#39ff14" stroke-width="1" opacity="0.25"/>
  <line x1="200" y1="200" x2="110" y2="210" stroke="#39ff14" stroke-width="1" opacity="0.25"/>
  <line x1="200" y1="200" x2="130" y2="295" stroke="#39ff14" stroke-width="1" opacity="0.25"/>
  <line x1="200" y1="200" x2="285" y2="120" stroke="#39ff14" stroke-width="1" opacity="0.25"/>
  <line x1="200" y1="200" x2="300" y2="285" stroke="#39ff14" stroke-width="1" opacity="0.25"/>

  <!-- Satellite nodes -->
  <circle cx="120" cy="120" r="6" fill="#0a0a0d" stroke="#39ff14" stroke-width="1.2" opacity="0.6"/>
  <circle cx="110" cy="210" r="6" fill="#0a0a0d" stroke="#39ff14" stroke-width="1.2" opacity="0.6"/>
  <circle cx="130" cy="295" r="6" fill="#0a0a0d" stroke="#39ff14" stroke-width="1.2" opacity="0.6"/>
  <circle cx="285" cy="120" r="6" fill="#0a0a0d" stroke="#39ff14" stroke-width="1.2" opacity="0.6"/>
  <circle cx="300" cy="285" r="6" fill="#0a0a0d" stroke="#39ff14" stroke-width="1.2" opacity="0.6"/>

  <!-- Central node glow halo -->
  <circle cx="200" cy="200" r="32" fill="#39ff14" opacity="0.04" filter="url(#glow-green)"/>
  <!-- Central node -->
  <circle cx="200" cy="200" r="14" fill="#0a0a0d" stroke="#39ff14" stroke-width="2" filter="url(#glow-dot)"/>
  <circle cx="200" cy="200" r="5" fill="#39ff14" opacity="0.9"/>

  <!-- ================================ -->
  <!-- RIGHT SIDE: Agenturinhaber       -->
  <!-- Mesh: 15 nodes, denser structure -->
  <!-- ================================ -->

  <!-- Node positions (15 nodes spread across right half) -->
  <!-- Row 1 -->
  <!-- n1=480,100  n2=540,80  n3=610,110  n4=670,90  n5=720,130 -->
  <!-- Row 2 -->
  <!-- n6=460,185  n7=520,165  n8=590,190  n9=650,175  n10=710,200 -->
  <!-- Row 3 -->
  <!-- n11=480,270  n12=545,300  n13=615,280  n14=670,310  n15=720,260 -->

  <!-- Mesh connections (selective, not all) -->
  <g stroke="#64748b" stroke-width="0.8" opacity="0.3">
    <line x1="480" y1="100" x2="540" y2="80"/>
    <line x1="540" y1="80" x2="610" y2="110"/>
    <line x1="610" y1="110" x2="670" y2="90"/>
    <line x1="670" y1="90" x2="720" y2="130"/>
    <line x1="480" y1="100" x2="460" y2="185"/>
    <line x1="540" y1="80" x2="520" y2="165"/>
    <line x1="610" y1="110" x2="590" y2="190"/>
    <line x1="670" y1="90" x2="650" y2="175"/>
    <line x1="720" y1="130" x2="710" y2="200"/>
    <line x1="460" y1="185" x2="520" y2="165"/>
    <line x1="520" y1="165" x2="590" y2="190"/>
    <line x1="590" y1="190" x2="650" y2="175"/>
    <line x1="650" y1="175" x2="710" y2="200"/>
    <line x1="460" y1="185" x2="480" y2="270"/>
    <line x1="520" y1="165" x2="545" y2="300"/>
    <line x1="590" y1="190" x2="615" y2="280"/>
    <line x1="650" y1="175" x2="670" y2="310"/>
    <line x1="710" y1="200" x2="720" y2="260"/>
    <line x1="480" y1="270" x2="545" y2="300"/>
    <line x1="545" y1="300" x2="615" y2="280"/>
    <line x1="615" y1="280" x2="670" y2="310"/>
    <line x1="670" y1="310" x2="720" y2="260"/>
    <!-- Cross connections -->
    <line x1="480" y1="100" x2="590" y2="190"/>
    <line x1="540" y1="80" x2="650" y2="175"/>
    <line x1="520" y1="165" x2="615" y2="280"/>
    <line x1="590" y1="190" x2="720" y2="260"/>
  </g>

  <!-- The 15 nodes -->
  <circle cx="480" cy="100" r="5" fill="#64748b" opacity="0.55"/>
  <circle cx="540" cy="80"  r="5" fill="#64748b" opacity="0.55"/>
  <circle cx="610" cy="110" r="5" fill="#64748b" opacity="0.55"/>
  <circle cx="670" cy="90"  r="5" fill="#64748b" opacity="0.55"/>
  <circle cx="720" cy="130" r="5" fill="#64748b" opacity="0.55"/>
  <circle cx="460" cy="185" r="5" fill="#64748b" opacity="0.55"/>
  <circle cx="520" cy="165" r="5" fill="#64748b" opacity="0.55"/>
  <circle cx="590" cy="190" r="5" fill="#64748b" opacity="0.55"/>
  <circle cx="650" cy="175" r="5" fill="#64748b" opacity="0.55"/>
  <circle cx="710" cy="200" r="5" fill="#64748b" opacity="0.55"/>
  <circle cx="480" cy="270" r="5" fill="#64748b" opacity="0.55"/>
  <circle cx="545" cy="300" r="5" fill="#64748b" opacity="0.55"/>
  <circle cx="615" cy="280" r="5" fill="#64748b" opacity="0.55"/>
  <circle cx="670" cy="310" r="5" fill="#64748b" opacity="0.55"/>
  <circle cx="720" cy="260" r="5" fill="#64748b" opacity="0.55"/>

  <!-- Center/owner node on right side (slightly brighter) -->
  <circle cx="590" cy="190" r="9" fill="#0a0a0d" stroke="#64748b" stroke-width="1.5" opacity="0.8" filter="url(#glow-gray)"/>
  <circle cx="590" cy="190" r="3" fill="#64748b" opacity="0.9"/>

</svg>
